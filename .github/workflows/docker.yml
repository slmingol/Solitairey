name: Podman Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and test with Podman
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman
          pip3 install podman-compose

      - name: Verify Podman installation
        run: |
          podman --version
          podman-compose --version

      - name: Build Podman image
        run: podman-compose build web

      - name: Test build with podman-compose
        run: |
          podman-compose --profile build run --rm builder

      - name: Start production container
        run: |
          podman-compose up -d web
          sleep 5

      - name: Test production container
        run: |
          curl -f http://localhost:8080/ || exit 1
          echo "✅ Production container is serving content"

      - name: Check container health
        run: |
          podman ps
          podman-compose logs web

      - name: Stop containers
        if: always()
        run: |
          podman-compose down

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Tag and push image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_ID=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          [ "$VERSION" == "master" ] && VERSION=latest
          [ "$VERSION" == "main" ] && VERSION=latest
          echo "IMAGE_ID=$IMAGE_ID"
          echo "VERSION=$VERSION"
          podman tag solitairey-web:latest $IMAGE_ID:$VERSION
          podman push $IMAGE_ID:$VERSION

  # Security scan
  security:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Build image for scanning
        run: podman build -t scan-target .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
